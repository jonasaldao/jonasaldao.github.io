<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amira — Próximamente</title>
  <meta name="description" content="Amira — apoyo emocional, supervisado por profesionales. Próximamente." />
  <link rel="icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --background: oklch(0.985 0.008 80);
      --foreground: oklch(0.18 0.015 60);
      --muted-foreground: oklch(0.52 0.02 60);
      --primary: oklch(0.45 0.12 145);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background: oklch(0.15 0.015 60);
        --foreground: oklch(0.93 0.01 80);
        --muted-foreground: oklch(0.65 0.015 70);
        --primary: oklch(0.62 0.13 145);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1rem;
      gap: 2rem;
      background: var(--background);
      color: var(--foreground);
      font-family: "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .hero { max-width: 36rem; display: flex; flex-direction: column; gap: 1rem; }

    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-size: 3rem;
      line-height: 1.1;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    h1 .accent { color: var(--primary); }

    .lead { color: var(--muted-foreground); font-size: 1.125rem; line-height: 1.6; }

    .soon {
      color: var(--muted-foreground);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    @media (max-width: 480px) {
      h1 { font-size: 2.25rem; }
      .lead { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1>Apoyo emocional, <span class="accent">supervisado por profesionales</span></h1>
    <p class="lead">
      Amira te acompaña entre sesiones con inteligencia artificial empática y supervisión
      clínica humana. No reemplaza la terapia — la complementa.
    </p>
  </main>
  <p class="soon">Próximamente...</p>
</body>
</html>
