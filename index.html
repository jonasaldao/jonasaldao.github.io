<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amira — Próximamente</title>
  <meta name="description" content="Amira — salud mental digital. Próximamente." />
  <link rel="icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --background: oklch(0.985 0.008 80);
      --foreground: oklch(0.18 0.015 60);
      --card: oklch(0.99 0.005 80);
      --muted-foreground: oklch(0.52 0.02 60);
      --primary: oklch(0.45 0.12 145);
      --primary-foreground: oklch(0.99 0.005 80);
      --secondary: oklch(0.93 0.02 80);
      --border: oklch(0.88 0.015 80);
      --input: oklch(0.88 0.015 80);
      --radius: 0.75rem;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background: oklch(0.15 0.015 60);
        --foreground: oklch(0.93 0.01 80);
        --card: oklch(0.2 0.015 60);
        --muted-foreground: oklch(0.65 0.015 70);
        --primary: oklch(0.62 0.13 145);
        --primary-foreground: oklch(0.15 0.015 60);
        --secondary: oklch(0.27 0.02 60);
        --border: oklch(1 0 0 / 10%);
        --input: oklch(1 0 0 / 12%);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: var(--background);
      color: var(--foreground);
      font-family: "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      width: 100%;
      max-width: 28rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header { text-align: center; display: flex; flex-direction: column; gap: 0.5rem; }

    .header h1 {
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.875rem;
      line-height: 1.15;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header p { color: var(--muted-foreground); font-size: 0.875rem; }

    .form { display: flex; flex-direction: column; gap: 1rem; }

    .field { display: flex; flex-direction: column; gap: 0.375rem; }

    label { font-size: 0.875rem; font-weight: 500; }

    input {
      width: 100%;
      height: 2.5rem;
      padding: 0 0.75rem;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--foreground);
      background: transparent;
      border: 1px solid var(--input);
      border-radius: calc(var(--radius) * 0.8);
    }

    input::placeholder { color: var(--muted-foreground); opacity: 0.7; }
    input:disabled { opacity: 0.6; cursor: not-allowed; }

    .soon {
      width: 100%;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--primary-foreground);
      background: var(--primary);
      border-radius: calc(var(--radius) * 0.8);
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="header">
      <h1>Hola de vuelta!</h1>
      <p>Ingresá con tu email y contraseña</p>
    </div>
    <div class="form">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="vos@ejemplo.com" disabled />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" disabled />
      </div>
      <div class="soon">Próximamente</div>
    </div>
  </main>
</body>
</html>
